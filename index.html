<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Converter – Paste &amp; Copy as PNG</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    header p {
      color: #555;
      font-size: 0.95rem;
      max-width: 480px;
    }

    #drop-zone {
      width: 100%;
      max-width: 640px;
      min-height: 200px;
      border: 2.5px dashed #94a3b8;
      border-radius: 16px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      padding: 2rem;
      text-align: center;
    }

    #drop-zone.highlight {
      border-color: #6366f1;
      background: #eef2ff;
    }

    #drop-zone svg {
      width: 48px;
      height: 48px;
      color: #94a3b8;
    }

    #drop-zone p {
      color: #64748b;
      font-size: 0.95rem;
    }

    #drop-zone kbd {
      background: #e2e8f0;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 0.85rem;
      font-family: monospace;
    }

    #result-section {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-top: 2rem;
      width: 100%;
      max-width: 640px;
    }

    #result-section.visible { display: flex; }

    #preview {
      max-width: 100%;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.55rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:active { transform: scale(0.97); }

    #copy-btn {
      background: #6366f1;
      color: #fff;
    }

    #copy-btn:hover { opacity: 0.88; }

    #download-btn {
      background: #e2e8f0;
      color: #1a1a2e;
    }

    #download-btn:hover { opacity: 0.8; }

    #clear-btn {
      background: transparent;
      color: #94a3b8;
      border: 1.5px solid #e2e8f0;
    }

    #clear-btn:hover { background: #f8fafc; }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e293b;
      color: #fff;
      padding: 0.55rem 1.2rem;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      transition: transform 0.3s ease;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    #format-info {
      font-size: 0.8rem;
      color: #94a3b8;
    }

    canvas { display: none; }
  </style>
</head>
<body>

<header>
  <h1>🖼️ Image Clipboard Converter</h1>
  <p>Paste any image (including HEIC/screenshot captures), and copy it back as a universal PNG — perfect for Google Slides and other apps.</p>
</header>

<div id="drop-zone" tabindex="0" role="button" aria-label="Paste image here">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
    <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909M3 20.25h18A.75.75 0 0021.75 19.5V6A.75.75 0 0021 5.25H3A.75.75 0 002.25 6v13.5A.75.75 0 003 20.25z"/>
  </svg>
  <p><strong>Click here and paste</strong> an image (<kbd>⌘V</kbd> / <kbd>Ctrl+V</kbd>)</p>
  <p>or drag &amp; drop an image file</p>
</div>

<section id="result-section" aria-live="polite">
  <img id="preview" alt="Converted image preview" />
  <p id="format-info"></p>
  <div class="actions">
    <button id="copy-btn" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 17.25v3.375c0 .621-.504 1.125-1.125 1.125h-9.75a1.125 1.125 0 01-1.125-1.125V7.875c0-.621.504-1.125 1.125-1.125H6.75a9.06 9.06 0 011.5.124m7.5 10.376h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-4.46-3.243-8.161-7.5-8.878a9.06 9.06 0 00-1.5-.124H9.375c-.621 0-1.125.504-1.125 1.125v3.5m7.5 10.375H9.375a1.125 1.125 0 01-1.125-1.125v-9.25m12 6.625v-1.875a3.375 3.375 0 00-3.375-3.375h-1.5a1.125 1.125 0 01-1.125-1.125v-1.5a3.375 3.375 0 00-3.375-3.375H9.75"/></svg>
      Copy as PNG
    </button>
    <button id="download-btn" type="button">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      Download PNG
    </button>
    <button id="clear-btn" type="button">Clear</button>
  </div>
</section>

<canvas id="canvas"></canvas>
<div id="toast" role="status" aria-live="assertive"></div>

<script>
  const dropZone = document.getElementById('drop-zone');
  const resultSection = document.getElementById('result-section');
  const preview = document.getElementById('preview');
  const formatInfo = document.getElementById('format-info');
  const copyBtn = document.getElementById('copy-btn');
  const downloadBtn = document.getElementById('download-btn');
  const clearBtn = document.getElementById('clear-btn');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const toast = document.getElementById('toast');

  let pngDataUrl = null;
  let toastTimer = null;

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
  }

  function processImageFile(file) {
    if (!file || !file.type.startsWith('image/')) {
      showToast('⚠️ Please paste an image.');
      return;
    }

    const originalType = file.type;
    const reader = new FileReader();

    reader.onload = function(e) {
      const img = new Image();
      img.onload = function() {
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0);

        pngDataUrl = canvas.toDataURL('image/png');
        preview.src = pngDataUrl;
        formatInfo.textContent = `Original format: ${originalType} → converted to PNG (${img.naturalWidth}×${img.naturalHeight}px)`;
        resultSection.classList.add('visible');
        resultSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      };
      img.onerror = function() {
        showToast('❌ Could not load image. Try saving as PNG/JPEG first.');
      };
      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  }

  // Paste anywhere on the page
  document.addEventListener('paste', function(e) {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
      if (item.kind === 'file' && item.type.startsWith('image/')) {
        e.preventDefault();
        processImageFile(item.getAsFile());
        return;
      }
    }
    showToast('⚠️ No image found in clipboard. Copy an image first.');
  });

  // Click to focus (so subsequent paste events are captured)
  dropZone.addEventListener('click', function() {
    dropZone.focus();
  });

  dropZone.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' || e.key === ' ') dropZone.click();
  });

  // Drag & drop support
  dropZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    dropZone.classList.add('highlight');
  });

  dropZone.addEventListener('dragleave', function() {
    dropZone.classList.remove('highlight');
  });

  dropZone.addEventListener('drop', function(e) {
    e.preventDefault();
    dropZone.classList.remove('highlight');
    const file = e.dataTransfer.files[0];
    processImageFile(file);
  });

  // Copy as PNG
  copyBtn.addEventListener('click', async function() {
    if (!pngDataUrl) return;
    try {
      const res = await fetch(pngDataUrl);
      const blob = await res.blob();
      await navigator.clipboard.write([
        new ClipboardItem({ 'image/png': blob })
      ]);
      showToast('✅ PNG copied to clipboard! Paste it anywhere.');
    } catch (err) {
      // Fallback: open in new tab for manual copy
      const w = window.open();
      if (w) {
        const img = w.document.createElement('img');
        img.src = pngDataUrl;
        img.style.maxWidth = '100%';
        w.document.body.appendChild(img);
      }
      showToast('ℹ️ Opened in new tab — right-click the image and choose "Copy Image".');
    }
  });

  // Download as PNG
  downloadBtn.addEventListener('click', function() {
    if (!pngDataUrl) return;
    const a = document.createElement('a');
    a.href = pngDataUrl;
    a.download = 'converted-image.png';
    a.click();
  });

  // Clear
  clearBtn.addEventListener('click', function() {
    pngDataUrl = null;
    preview.src = '';
    formatInfo.textContent = '';
    resultSection.classList.remove('visible');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
  });
</script>
</body>
</html>
